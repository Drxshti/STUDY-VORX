<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDYVORX — System Authorization</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogonew.jpg" class="logo-icon" alt="SV_LOGO">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="login.html" class="active-link">Login</a>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <button class="btn btn-shift">Shift Mode</button>
        </nav>
    </header>

    <main class="main-container center-layout">
        <div class="panel-box" style="max-width: 450px; width: 100%;">
            <div class="panel-header bg-purple">
                <span>[AUTH_GATEWAY]</span>
                <span>SECURE</span>
            </div>
            
            <div class="panel-body">
                <h3 class="section-title text-teal" style="text-align: center; margin-bottom: 25px;">SYSTEM LOGIN</h3>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>OPERATOR ID (USERNAME)</label>
                        <input type="text" id="usernameInput" class="input-field" placeholder="Enter User ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label>ENCRYPTED KEY (PASSWORD)</label>
                        <input type="password" id="passwordInput" class="input-field" placeholder="••••••••" required>
                    </div>
                    
                    <div id="loginStatus" class="status-alert" style="display: none; text-align: center; font-size: 14px; margin-top: 15px;"></div>

                    <button type="submit" class="btn-action" style="margin-top: 15px;">AUTHENTICATE</button>
                </form>
                
                <p class="paragraph-text" style="text-align: center; margin-top: 15px; font-size: 12px; color: var(--accent-pink);">
                    *Authorization requires registered access credentials.
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

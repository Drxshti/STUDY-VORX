<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDYVORX — System Authorization</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
            --bg-color: #121016;
            --container-bg: #1c1825;
            --border-color: #000000;
            --text-color: #ffffff;
            --accent-purple: #a855f7;
            --accent-teal: #2dd4bf;
            --accent-pink: #f43f5e;
            --neo-shadow: 6px 6px 0px #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--container-bg);
            border-bottom: 4px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border-color);
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        nav a.active-link {
            color: var(--accent-teal);
            border-bottom: 3px solid var(--accent-teal);
        }

        .center-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 40px 20px;
        }

        .panel-box {
            background-color: var(--container-bg);
            border: 4px solid var(--border-color);
            box-shadow: var(--neo-shadow);
            width: 100%;
        }

        .panel-header {
            padding: 10px 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            border-bottom: 4px solid var(--border-color);
            color: #000000;
        }

        .bg-purple { background-color: var(--accent-purple); }

        .panel-body {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-field {
            background-color: #121016;
            border: 3px solid var(--border-color);
            padding: 12px;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
        }

        .input-field:focus {
            outline: 3px solid var(--accent-teal);
        }

        .btn-action {
            width: 100%;
            background-color: var(--accent-teal);
            color: #000000;
            border: 3px solid var(--border-color);
            padding: 14px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000000;
            transition: transform 0.1s;
        }

        .btn-action:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000000;
        }

        .status-alert {
            padding: 10px;
            border: 3px solid var(--border-color);
            background: #000000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div id="welcomeOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: var(--bg-color, #121016); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 8px solid var(--border-color, #000);">
        
        <button id="welcomeBtn" class="btn-action bg-purple" style="max-width: 250px; font-size: 20px; padding: 15px 30px;">Click Me</button>
        
        <h1 id="welcomeText" style="display: none; color: var(--accent-teal, #2dd4bf); font-size: 28px; text-shadow: 2px 2px 0px #000; text-align: center; margin-top: 20px;">Welcome to my website, Drishti!</h1>
        
    </div>
        
        <div class="logo-area">
            <img src="3dlogonew.jpg" class="logo-icon" alt="⚡">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#about">About Us</a>
            <a href="index.html#contact-feedback">Contact</a>
            <a href="login.html" class="active-link">Login</a>
        </nav>
    </header>

    <main class="center-layout">
        <div class="panel-box" style="max-width: 420px;">
            <div class="panel-header bg-purple">
                <span>LOGIN</span>
                <span>SECURE</span>
            </div>
            
            <div class="panel-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label>OPERATOR ID (USERNAME)</label>
                        <input type="text" id="usernameInput" class="input-field" placeholder="Enter Operator ID" required>
                    </div>
                    
                    <div class="form-group">
                        <label>ENCRYPTED ACCESS KEY (PASSWORD)</label>
                        <input type="password" id="passwordInput" class="input-field" placeholder="••••••••" required>
                    </div>
                    
                    <div id="loginStatus" class="status-alert" style="display: none; text-align: center; font-size: 13px; margin-top: 15px; margin-bottom: 15px;"></div>

                    <button type="submit" class="btn-action">AUTHENTICATE SYSTEM</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

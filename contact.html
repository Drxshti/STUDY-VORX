<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDYVORX — Contact & Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogonew.jpg" class="logo-icon" alt="SV_LOGO">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active-link">Contact</a>
            <a href="login.html">Login</a>
            <button class="btn btn-shift">Shift Mode</button>
        </nav>
    </header>

    <main class="main-container center-layout">
        <div class="panel-box combined-contact-box">
            <div class="panel-header bg-purple">
                <span>[COMMUNICATION_MATRIX]</span>
                <span>V1.0</span>
            </div>
            
            <div class="panel-body contact-grid">
                <div class="contact-info-side">
                    <h3 class="section-title text-teal">CONTACT HQ</h3>
                    <p class="paragraph-text">Have questions, bugs to report, or core updates to request? Reach out directly through our node lines.</p>
                    
                    <div class="retro-divider"></div>
                    
                    <div class="contact-meta">
                        <p><strong>EMAIL:</strong> support@studyvorx.com</p>
                        <p><strong>SYSTEM STATUS:</strong> <span class="text-teal">OPERATIONAL</span></p>
                        <p><strong>RESPONSE TIME:</strong> &lt; 24 HOURS</p>
                    </div>
                </div>

                <div class="feedback-form-side">
                    <h3 class="section-title text-pink">FEEDBACK LOOP</h3>
                    
                    <div class="form-group">
                        <label>USER ENVELOPE (EMAIL)</label>
                        <input type="email" class="input-field" placeholder="yourname@domain.com">
                    </div>
                    
                    <div class="form-group">
                        <label>FEEDBACK METRIC TRANSMISSION</label>
                        <textarea class="textarea-field" placeholder="Drop your suggestions, bug discoveries, or feature requests here..."></textarea>
                    </div>
                    
                    <button class="btn-action btn-teal-accent">TRANSMIT FEEDBACK</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVorx // Broadcast Router Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogo.jpg" alt="⚡" class="logo-icon">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html" class="active-link">Contact</a>
            <a href="feedback.html">Feedback</a>
            <button class="btn btn-shift" id="themeToggleBtn">Shift Mode</button>
        </nav>
    </header>

    <main style="max-width: 600px;">
        <section class="panel-box">
            <div class="panel-header bg-purple">
                <span>[Broadcast_Router]</span>
                <span>Secure</span>
            </div>
            <div class="panel-body">
                <p class="paragraph-text" style="margin-bottom: 25px;">
                    Need features added or ran into a system compilation anomaly? Ping our design array link:
                </p>
                <form id="contactForm" onsubmit="event.preventDefault();">
                    <div class="form-group">
                        <label>Operator ID (Name)</label>
                        <input type="text" class="input-field" placeholder="e.g. Student 1">
                    </div>
                    
                    <div class="form-group">
                        <label>Signal Route (Email)</label>
                        <input type="email" class="input-field" placeholder="you@example.com">
                    </div>

                    <div class="form-group">
                        <label>Data Payload (Message)</label>
                        <textarea class="textarea-field" placeholder="Type transmission requirements here..."></textarea>
                    </div>

                    <button type="button" class="btn btn-action btn-teal-accent">Launch Packets</button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVorx // Last-Minute Exam Crunch</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1435.0.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogonew.jpg" alt="⚡" class="logo-icon">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="login.html">Login</a>
            <a href="index.html" class="active-link">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <button class="btn btn-shift">Shift Mode</button>
        </nav>
    </header>

    <main style="max-width: 1400px; margin: 40px auto; padding: 0 20px;">
        
        <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 40px; align-items: start;">
            
            <div style="display: flex; flex-direction: column; gap: 30px;">
                
                <section class="panel-box">
                    <div class="panel-header bg-teal">
                        <span>[AWS_S3_UPLOADER]</span>
                        <span>SECURE</span>
                    </div>
                    <div class="panel-body">
                        <h3 class="section-title text-pink" style="margin-top: 0;">DOCUMENT INGESTION</h3>
                        
                        <div class="form-group">
                            <label>SELECT TARGET FILE (PDF, DOC, DOCX, TXT)</label>
                            <input type="file" id="awsFileInput" class="input-field" accept=".pdf,.doc,.docx,.txt" style="padding: 10px; cursor: pointer; width: 100%; box-sizing: border-box;">
                        </div>

                        <div id="awsUploadStatus" class="status-alert" style="display: none; background-color: #000; border: 3px solid var(--border-color); margin-bottom: 15px; padding: 10px; font-weight: bold; font-size: 13px;">
                            </div>

                        <button id="awsUploadBtn" type="button" class="btn-action" style="background-color: var(--accent-teal); color: #000; width: 100%;">UPLOAD TO AWS</button>
                    </div>
                </section>

                <section class="panel-box">
                    <div class="panel-header bg-purple">
                        <span>[Input_Core]</span>
                        <span>V1.0</span>
                    </div>
                    
                    <div class="panel-body">
                        <div id="welcomeMessage" class="status-alert text-teal" style="display: none; margin-bottom: 15px; text-align: center; font-size: 16px;"></div>

                        <form onsubmit="event.preventDefault();">
                            <div class="form-group">
                                <label>Or Paste Material Content Data</label>
                                <textarea class="textarea-field" placeholder="Paste chapters, concept definitions, or raw study metrics here to build your crunch revision sets..." style="width: 100%; box-sizing: border-box;"></textarea>
                            </div>

                            <div class="form-group">
                                <label>Target Generation Filter</label>
                                <select class="select-field filter-select" style="width: 100%; box-sizing: border-box;">
                                    <option value="MCQ" selected>Multiple Choice Framework (MCQ)</option>
                                    <option value="VERY_SHORT">Very Short Answer (1 marker)</option>
                                    <option value="SHORT">Short Answer (3 marker)</option>
                                    <option value="LONG">Long Answer (5 marker)</option>
                                    <option value="FLASHCARD">Flashcard Summary Engine</option>
                                    <option value="TRUE_FALSE">True / False Verification Array</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>QUANTITY COUNT FILTER</label>
                                <select class="select-field quantity-select" style="width: 100%; box-sizing: border-box;">
                                    <option value="5">5 Questions</option>
                                    <option value="10" selected>10 Questions</option>
                                    <option value="25">25 Questions</option>
                                    <option value="50">50 Questions</option>
                                    <option value="100">100 Questions</option>
                                </select>
                            </div>

                            <button type="button" class="btn btn-action" style="width: 100%;">Generate Crunch Study Set</button>
                        </form>
                    </div>
                </section>
                
            </div>

            <section class="panel-box" style="height: 100%; min-height: 500px;">
                <div class="panel-header bg-teal">
                    <span>Crunch Feed Monitor</span>
                    <span>Ready</span>
                </div>
                <div class="panel-body" style="height: calc(100% - 40px); display: flex; flex-direction: column;">
                    <div class="monitor-display" style="flex-grow: 1;">
                        <div class="status-alert">CONSOLES IDLE</div>
                        <p class="status-desc">
                            Drop your notes on the left control dashboard to run high-speed, instant AI-simulated revision checks before stepping into exams.
                        </p>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVorx // Last-Minute Exam Crunch</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1435.0.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogonew.jpg" alt="⚡" class="logo-icon">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="login.html">Login</a>
            <a href="index.html" class="active-link">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <button class="btn btn-shift">Shift Mode</button>
        </nav>
    </header>

    <main style="max-width: 1400px; margin: 40px auto; padding: 0 20px;">
        <div class="dashboard-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 40px; align-items: start;">
            
            <section class="panel-box">
                <div class="panel-header bg-purple">
                    <span>[Input_Core]</span>
                    <span>V1.0</span>
                </div>
                
                <div class="panel-body">
                    <form onsubmit="event.preventDefault();">
                        
                        <div class="form-group">
                            <label style="text-transform: uppercase;">Upload Revision Material</label>
                            
                            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" style="margin-top: 5px; cursor: pointer;">
                                <span class="retro-folder">📁</span>
                                <span id="uploadText" style="font-weight: bold;">Click to Drop PDF, DOC, DOCX or TXT</span>
                                <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" style="display: none;">
                            </div>

                            <div id="uploadProgressWrapper" style="display: none; margin-top: 15px;">
                                <div style="border: 3px solid var(--border-color); background: #000; height: 25px; position: relative; box-shadow: var(--neo-shadow-clickable);">
                                    <div id="progressBar" style="background: var(--accent-teal); width: 0%; height: 100%; transition: width 0.1s ease;"></div>
                                </div>
                                <div id="progressPercent" style="font-size: 12px; margin-top: 5px; text-align: right; font-family: monospace; font-weight: bold; color: white;">0% TRANSMITTED</div>
                            </div>

                            <div id="uploadStatusMessage" class="paragraph-text" style="margin-top: 10px; display: none; font-size: 13px; font-weight: bold;"></div>

                            <button type="button" id="awsUploadBtn" class="btn-action" style="margin-top: 15px; background-color: transparent; border: 2px dashed var(--accent-teal); color: var(--accent-teal); width: 100%; font-size: 12px; cursor: pointer; transition: all 0.2s;">[ INITIATE AWS SECURE UPLOAD ]</button>
                        </div>

                        <div class="form-group" style="margin-top: 30px;">
                            <label style="text-transform: uppercase;">Or Paste Material Content Data</label>
                            <textarea class="textarea-field" placeholder="Paste chapters, concept definitions, or raw study metrics here to build your crunch revision sets..." style="width: 100%; box-sizing: border-box; min-height: 120px;"></textarea>
                        </div>

                        <div class="form-group">
                            <label style="text-transform: uppercase;">Target Generation Filter</label>
                            <select class="select-field filter-select" style="width: 100%; box-sizing: border-box;">
                                <option value="MCQ" selected>Multiple Choice Framework (MCQ)</option>
                                <option value="VERY_SHORT">Very Short Answer (1 marker)</option>
                                <option value="SHORT">Short Answer (3 marker)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label style="text-transform: uppercase;">QUANTITY COUNT FILTER</label>
                            <select class="select-field quantity-select" style="width: 100%; box-sizing: border-box;">
                                <option value="10" selected>10 Questions</option>
                                <option value="25">25 Questions</option>
                            </select>
                        </div>

                        <button type="button" class="btn btn-action" style="width: 100%; margin-top: 20px;">GENERATE CRUNCH STUDY SET</button>
                    </form>
                </div>
            </section>

            <section class="panel-box" style="height: 100%; min-height: 500px;">
                <div class="panel-header bg-teal">
                    <span>Crunch Feed Monitor</span>
                    <span>Ready</span>
                </div>
                <div class="panel-body" style="height: calc(100% - 40px); display: flex; flex-direction: column;">
                    <div class="monitor-display" style="flex-grow: 1;">
                        <div class="status-alert">CONSOLES IDLE</div>
                        <p class="status-desc">
                            Drop your notes on the left control dashboard to run high-speed, instant AI-simulated revision checks before stepping into exams.
                        </p>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const fileInput = document.getElementById('fileInput');
            const uploadText = document.getElementById('uploadText');
            const uploadProgressWrapper = document.getElementById('uploadProgressWrapper');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const uploadStatusMessage = document.getElementById('uploadStatusMessage');
            const awsUploadBtn = document.getElementById('awsUploadBtn');

            let currentFile = null;

            // 1. Handle File Selection (Makes text say "SELECTED: file.pdf")
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        currentFile = e.target.files[0];
                        uploadText.style.color = 'var(--accent-teal)';
                        uploadText.innerText = `SELECTED: ${currentFile.name}`;
                        uploadStatusMessage.style.display = 'none'; 
                        if(uploadProgressWrapper) uploadProgressWrapper.style.display = 'none';
                    }
                });
            }

            // 2. Handle Upload Click
            if (awsUploadBtn) {
                awsUploadBtn.addEventListener('click', (e) => {
                    e.preventDefault(); 
                    
                    if (!currentFile) {
                        showError("Please click the folder to select a file first.");
                        return;
                    }

                    // Start UI Animation
                    uploadStatusMessage.style.display = 'none';
                    uploadProgressWrapper.style.display = 'block';
                    progressBar.style.width = '10%';
                    progressPercent.innerText = 'AUTHENTICATING...';
                    awsUploadBtn.disabled = true;
                    awsUploadBtn.style.opacity = '0.5';

                    // ==========================================
                    // AWS CONFIGURATION
                    // ==========================================
                    
                    // 👇 YOUR EXACT BUCKET NAME GOES HERE 👇
                    const BUCKET_NAME = 'studyvorx-exam-uploads'; 

                    AWS.config.update({
                        region: 'us-east-1',
                        credentials: new AWS.CognitoIdentityCredentials({
                            IdentityPoolId: 'us-east-1:9668dafa-b10a-470c-8d65-c23a17547bfe'
                        })
                    });

                    // Force Auth Check
                    AWS.config.credentials.get(function(authErr) {
                        if (authErr) {
                            showError(`COGNITO AUTH FAILED: ${authErr.message}`);
                            return;
                        }

                        // S3 Upload
                        progressPercent.innerText = 'ACCESS GRANTED. UPLOADING...';
                        const upload = new AWS.S3.ManagedUpload({
                            params: {
                                Bucket: BUCKET_NAME,
                                Key: `uploads/${Date.now()}_${currentFile.name}`,
                                Body: currentFile
                            }
                        });

                        upload.on('httpUploadProgress', function(evt) {
                            const pct = Math.round((evt.loaded * 100) / evt.total);
                            progressBar.style.width = `${pct}%`;
                            progressPercent.innerText = `${pct}% TRANSMITTED`;
                        });

                        upload.send(function(s3Err, data) {
                            if (s3Err) {
                                showError(`S3 UPLOAD FAILED: ${s3Err.message}`);
                            } else {
                                progressBar.style.width = '100%';
                                progressPercent.innerText = '100% TRANSMITTED';
                                uploadText.style.color = 'var(--accent-teal)';
                                uploadText.innerText = `✅ ${currentFile.name} Secured!`;
                                
                                uploadStatusMessage.style.display = 'block';
                                uploadStatusMessage.style.color = 'var(--accent-teal)';
                                uploadStatusMessage.innerText = `✅ SUCCESS: File stored at AWS Data Core.`;

                                awsUploadBtn.disabled = false;
                                awsUploadBtn.style.opacity = '1';
                            }
                        });
                    });
                });
            }

            function showError(msg) {
                if(uploadProgressWrapper) uploadProgressWrapper.style.display = 'none';
                uploadStatusMessage.style.display = 'block';
                uploadStatusMessage.style.color = 'var(--accent-pink)';
                uploadStatusMessage.innerHTML = `❌ <strong>ERROR:</strong> ${msg}`;
                if(awsUploadBtn) {
                    awsUploadBtn.disabled = false;
                    awsUploadBtn.style.opacity = '1';
                }
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVorx // My Documents</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1435.0.min.js"></script>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="3dlogonew.jpg" alt="⚡" class="logo-icon">
            <span class="logo-text">STUDYVORX</span>
        </div>
        <nav>
            <a href="login.html">Login</a>
            <a href="index.html">Home</a>
            <a href="mydocuments.html" class="active-link">My Documents</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact & FAQ</a>
            <button class="btn btn-shift">Shift Mode</button>
        </nav>
    </header>

    <main style="max-width: 1400px; margin: 40px auto; padding: 0 20px;">
        <section class="panel-box">
            <div class="panel-header" style="background: var(--accent-blue); color: #000;">
                <span>[Data_Vault]</span>
                <span>Secure Cloud Storage</span>
            </div>
            
            <div class="panel-body" style="min-height: 400px;">
                <div id="documentList" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
                    <div style="color: var(--accent-teal); font-family: monospace; grid-column: 1 / -1; text-align: center; margin-top: 50px;">
                        [CONNECTING TO AWS CLOUD VAULT...]
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const documentList = document.getElementById('documentList');

            // 1. AWS CONFIGURATION
            const BUCKET_NAME = 'studyvorx-exam-uploads'; 

            AWS.config.update({
                region: 'us-east-1',
                credentials: new AWS.CognitoIdentityCredentials({
                    IdentityPoolId: 'us-east-1:9668dafa-b10a-470c-8d65-c23a17547bfe'
                })
            });

            const s3 = new AWS.S3({ apiVersion: '2006-03-01', params: { Bucket: BUCKET_NAME }});

            // 2. FETCH DOCUMENTS LOGIC
            function loadMyDocuments() {
                // Check if the guest pass works
                AWS.config.credentials.get(function(authErr) {
                    if (authErr) {
                        documentList.innerHTML = `<div style="color: var(--accent-pink); grid-column: 1/-1; text-align: center; margin-top: 50px;">❌ Auth Error: ${authErr.message}</div>`;
                        return;
                    }

                    // Fetch the list of files from S3
                    s3.listObjectsV2({ Prefix: 'uploads/' }, function(err, data) {
                        if (err) {
                            documentList.innerHTML = `<div style="color: var(--accent-pink); grid-column: 1/-1; text-align: center; margin-top: 50px;">❌ Error reading files: ${err.message}</div>`;
                            return;
                        }

                        // Filter out empty folder markers
                        const files = data.Contents.filter(item => item.Size > 0);
                        
                        // REQUIREMENT: Show empty state message
                        if (files.length === 0) {
                            documentList.innerHTML = `
                                <div style="text-align: center; width: 100%; padding: 60px 20px; border: 2px dashed var(--border-color); color: #888; grid-column: 1 / -1; margin-top: 20px;">
                                    <span style="font-size: 32px; display: block; margin-bottom: 15px;">📭</span>
                                    <span style="font-size: 18px;">No documents uploaded yet</span>
                                </div>`;
                            return;
                        }

                        // Sort newest files to the top
                        files.sort((a, b) => b.LastModified - a.LastModified);
                        let html = '';

                        // Loop through files and generate HTML cards
                        files.forEach(file => {
                            const fileName = file.Key.replace('uploads/', ''); 
                            const dateStr = new Date(file.LastModified).toLocaleString(); 
                            
                            // Generate a secure, temporary link to open the file
                            const url = s3.getSignedUrl('getObject', { 
                                Bucket: BUCKET_NAME, 
                                Key: file.Key, 
                                Expires: 3600 // Link expires in 1 hour for security
                            });

                            html += `
                                <div style="border: 1px solid var(--border-color); padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #000; box-shadow: 4px 4px 0px var(--accent-blue); transition: transform 0.2s;">
                                    <div style="overflow: hidden; padding-right: 15px;">
                                        <div style="font-weight: bold; color: var(--accent-teal); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; font-size: 15px;">📄 ${fileName}</div>
                                        <div style="font-size: 12px; color: #888; margin-top: 8px; font-family: monospace;">UPLOADED: ${dateStr}</div>
                                    </div>
                                    <div style="display: flex; gap: 10px;">
                                        <a href="${url}" target="_blank" style="background: var(--accent-blue); color: #000; padding: 10px 20px; text-decoration: none; font-size: 13px; font-weight: bold; font-family: monospace; border: 2px solid transparent; transition: all 0.2s;">VIEW</a>
                                        <button onclick="deleteDocument('${file.Key}')" style="background: var(--accent-pink); color: #fff; padding: 10px 20px; border: none; font-size: 13px; font-weight: bold; font-family: monospace; cursor: pointer; transition: all 0.2s;">DELETE</button>
                                    </div>
                                </div>
                            `;
                        });

                        documentList.innerHTML = html;
                    });
                });
            }

            window.deleteDocument = function(key) {
                if (!confirm("Are you sure you want to permanently delete this document from the cloud vault?")) return;
                s3.deleteObject({ Key: key }, function(err, data) {
                    if (err) {
                        alert("❌ Failed to delete document: " + err.message);
                    } else {
                        alert("✅ Document deleted successfully.");
                        loadMyDocuments();
                    }
                });
            };

            // Run the fetch function immediately when the page loads
            loadMyDocuments();
        });
    </script>
</body>
</html>
